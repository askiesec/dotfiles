;==============================================
; polybar config
; Equivalent to your minimal waybar setup + CSS
;==============================================

[colors]
background  = #000000
foreground  = #e6e6e6
focused-bg  = #111111
focused-bd  = #333333
unfocused   = #cccccc
unfocused-bd= #1a1a1a
warning     = #d4a017
critical    = #c53b3b
muted       = #c53b3b

[bar/main]
bottom  = true
height  = 22
width   = 100%

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = "JetBrainsMono Nerd Font:size=9;1"

padding-left  = 0
padding-right = 0
module-margin = 1

modules-left   = i3
modules-center =
modules-right  = cpu memory network pulseaudio battery clock tray

tray-position = right
tray-padding  = 6
tray-maxsize  = 16

cursor-click = pointer

;==============================================
; MODULES
;==============================================

[module/i3]
type = internal/i3
pin-workspaces = true
strip-indicator = true
index-sort = true

format = <label-state>

label-focused            = %name%
label-focused-padding    = 1
label-focused-foreground = #ffffff
label-focused-background = ${colors.focused-bg}

label-unfocused            = %name%
label-unfocused-padding    = 1
label-unfocused-foreground = ${colors.unfocused}

label-urgent            = %name%
label-urgent-padding    = 1
label-urgent-foreground = ${colors.foreground}

; --------------------------

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label         = CPU %percentage%%
label-padding = 0

format-warn           = <label-warn>
label-warn            = CPU %percentage%%
label-warn-foreground = ${colors.warning}
label-warn-padding    = 0

; polybar doesn't have a separate critical state — use warn for both
; critical threshold handled via separate module below if needed

; --------------------------

[module/memory]
type = internal/memory
interval = 5
format = <label>
label         = MEM %percentage_used%%
label-padding = 0

format-warn           = <label-warn>
label-warn            = MEM %percentage_used%%
label-warn-foreground = ${colors.warning}
label-warn-padding    = 0

warn-percentage = 70

; --------------------------

[module/network]
type = internal/network
interface-type = wireless
interval = 5

format-connected    = <label-connected>
label-connected     = NET %essid%
label-connected-padding = 0

format-disconnected           = <label-disconnected>
label-disconnected            = NET OFF
label-disconnected-foreground = ${colors.unfocused}
label-disconnected-padding    = 0

; --------------------------

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume        = <label-volume>
label-volume         = VOL %percentage%%
label-volume-padding = 0

format-muted           = <label-muted>
label-muted            = VOL MUTE
label-muted-foreground = ${colors.muted}
label-muted-padding    = 0

click-right = pavucontrol &

; --------------------------

[module/battery]
type = internal/battery
full-at = 99
low-at  = 15
poll-interval = 10

; Check your battery name: ls /sys/class/power_supply/
battery = BAT0
adapter = AC

format-charging    = <label-charging>
label-charging     = BAT %percentage%%
label-charging-padding = 0

format-discharging = <label-discharging>
label-discharging  = BAT %percentage%%
label-discharging-padding = 0

format-full    = <label-full>
label-full     = BAT FULL
label-full-padding = 0

format-low               = <label-low>
label-low                = BAT %percentage%%
label-low-foreground     = ${colors.critical}
label-low-padding        = 0

; --------------------------

[module/clock]
type = internal/date
interval = 30
date =
time = %H:%M
label = %time%
label-padding = 0

; --------------------------

[module/tray]
type = internal/tray
tray-spacing = 6
tray-size = 16%
